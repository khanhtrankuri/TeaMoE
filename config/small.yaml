# Small configuration for development and testing
# Suitable for 8-16GB GPUs (e.g. RTX 3060, 4060 Ti, single A100)

model:
  # -------------------- Encoder Backbone --------------------
  num_layers: 6                 # Reduced from 24
  moe_start_layer: 2
  moe_end_layer: 5
  model_dim: 256                # Reduced from 1024
  num_heads: 4                  # Reduced from 16
  conv_kernel_size: 31
  ff_multiplier: 4

  # -------------------- MoE Configuration --------------------
  num_groups: 4                 # Can reduce to 4 for testing
  experts_per_group: 3          # Can reduce to 3 for testing
  total_experts: 12            # 4 × 3
  top_k_groups: 1
  top_k_inference: 2

  # -------------------- Shared Pretrained Experts --------------------
  # For testing, set to null (train from scratch)
  # For real experiments, use paths from train_pretrained_experts.py
  group_expert_pretrained_paths: null

  # -------------------- Expert Pooling --------------------
  use_attention_pooling: false  # Set true for final experiments
  attn_heads: 4
  attn_dropout: 0.1

  # -------------------- Group Configurations --------------------
  # Using 4 groups for small config
  group_configs:
    - group_id: 0
      group_name: "vowels"
      num_experts: 3
      expert_dim: 256
      ff_multiplier: 4
      dropout: 0.1
      specialization: "vowels"
    - group_id: 1
      group_name: "plosives"
      num_experts: 3
      expert_dim: 256
      ff_multiplier: 4
      dropout: 0.1
      specialization: "plosives"
    - group_id: 2
      group_name: "fricatives"
      num_experts: 3
      expert_dim: 256
      ff_multiplier: 4
      dropout: 0.1
      specialization: "fricatives"
    - group_id: 3
      group_name: "nasals"
      num_experts: 3
      expert_dim: 256
      ff_multiplier: 4
      dropout: 0.1
      specialization: "nasals"

  # -------------------- Decoder --------------------
  vocab_size: 1000              # Reduced from 5000 for testing
  decoder_hidden: 256
  decoder_layers: 1             # Reduced from 2
  blank_id: 0

  # -------------------- Loss Weights --------------------
  competition_freq_steps: 0     # Disabled for small tests
  distillation_weight: 0.1
  load_balance_weight: 0.01
  z_loss_weight: 0.001
  ctc_phone_weight: 0.3

  # -------------------- Audio --------------------
  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024

  alpha: 0.5
  use_matchmaker: false         # Disable for small tests

# ============================================================================
# DATA
# ============================================================================
data:
  manifests_dir: "datasets/processed_data_librispeech/manifests"
  train_manifest: "train.jsonl"
  valid_manifest: "validation.jsonl"
  test_manifest: "test.jsonl"

  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024
  max_duration: 30.0
  num_workers: 2               # Reduced from 4

# ============================================================================
# TRAINING
# ============================================================================
training:
  num_epochs: 10               # Short training for testing
  batch_size: 8                # Smaller batch for 8-16GB GPUs
  learning_rate: 0.001
  warmup_steps: 1000           # Reduced from 50000
  total_steps: 10000           # Reduced from 500000
  output_dir: "checkpoints/small"
  resume: false

  gradient_accumulation_steps: 2  # Accumulate gradients to simulate larger batch
  max_grad_norm: 1.0
  weight_decay: 0.01
  use_amp: true
  use_checkpoint: true         # Essential for memory savings
  use_compile: false

  eval_every_n_steps: 200      # More frequent eval for short runs
  log_every_n_steps: 10
  save_every_n_steps: 1000
  keep_last_n_checkpoints: 3

  wandb_project: "TeaMoE-small"
  wandb_entity: null
  wandb_tags: ["small-config", "dev"]
  wandb_notes: "Small config for development/testing"

  device: null
  seed: 42

# ============================================================================
# NOTES FOR SMALL CONFIG
# ============================================================================
#
# This config is designed for:
# - Development and debugging
# - Testing new features
# - Running on consumer GPUs (8-16GB)
#
# Approximate memory usage:
# - Batch size 8, sequence length 500: ~6-8GB
# - With gradient checkpointing: ~4-6GB
#
# To train:
#   python train.py --config config/small.yaml --output-dir checkpoints/small
#
# Expected performance (LibriSpeech):
# - WER: ~15-25% (vs ~5-8% for full model)
# - Training time: 1-2 days on single GPU
#
# To scale up:
# 1. Increase model_dim: 256 → 512 → 1024
# 2. Increase num_layers: 6 → 12 → 24
# 3. Increase batch_size (with gradient accumulation)
# 4. Set group_expert_pretrained_paths with real checkpoints
# 5. Enable use_attention_pooling
#
# ============================================================================
