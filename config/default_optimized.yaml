# Memory-optimized config for smaller GPUs (e.g., 24GB with batch_size=4)
model:
  num_layers: 18  # Reduced from 24
  moe_start_layer: 4  # Adjusted for fewer layers
  moe_end_layer: 12
  model_dim: 768  # Reduced from 1024
  num_heads: 12  # Reduced from 16 (768/12 = 64 per head)
  conv_kernel_size: 31
  ff_multiplier: 3  # Reduced from 4 (768 -> 2304 -> 768)

  num_groups: 8
  experts_per_group: 4  # Reduced from 5
  total_experts: 32  # Reduced from 40
  top_k_groups: 1
  top_k_inference: 2

  group_configs:
    - group_id: 0
      group_name: "vowels"
      num_experts: 4
      expert_dim: 768
      ff_multiplier: 3
      dropout: 0.1
      specialization: "vowels"
    - group_id: 1
      group_name: "plosives"
      num_experts: 4
      expert_dim: 768
      ff_multiplier: 3
      dropout: 0.1
      specialization: "plosives"
    - group_id: 2
      group_name: "fricatives"
      num_experts: 4
      expert_dim: 768
      ff_multiplier: 3
      dropout: 0.1
      specialization: "fricatives"
    - group_id: 3
      group_name: "nasals"
      num_experts: 4
      expert_dim: 768
      ff_multiplier: 3
      dropout: 0.1
      specialization: "nasals"
    - group_id: 4
      group_name: "male_speakers"
      num_experts: 4
      expert_dim: 768
      ff_multiplier: 3
      dropout: 0.1
      specialization: "male"
    - group_id: 5
      group_name: "female_speakers"
      num_experts: 4
      expert_dim: 768
      ff_multiplier: 3
      dropout: 0.1
      specialization: "female"
    - group_id: 6
      group_name: "clean_audio"
      num_experts: 4
      expert_dim: 768
      ff_multiplier: 3
      dropout: 0.1
      specialization: "clean"
    - group_id: 7
      group_name: "other_audio"
      num_experts: 4
      expert_dim: 768
      ff_multiplier: 3
      dropout: 0.1
      specialization: "other"

  vocab_size: 5000
  decoder_hidden: 768  # Reduced from 1024
  decoder_layers: 2
  blank_id: 0

  competition_freq_steps: 1000
  distillation_weight: 0.1
  load_balance_weight: 0.01
  z_loss_weight: 0.001
  ctc_phone_weight: 0.3

  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024

  alpha: 0.5
  use_matchmaker: true

data:
  manifests_dir: "datasets/processed_data_librispeech/manifests"
  train_manifest: "train.jsonl"
  valid_manifest: "validation.jsonl"
  test_manifest: "test.jsonl"
  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024
  max_duration: 30.0
  num_workers: 4  # Increased from 0

training:
  num_epochs: 50
  batch_size: 4  # Your specified batch size
  learning_rate: 0.001
  warmup_steps: 50000
  total_steps: 500000
  gradient_accumulation_steps: 4  # Effective batch size = 4 * 4 = 16
  use_amp: true  # Mixed precision - critical for memory
  use_checkpoint: true  # Gradient checkpointing - huge memory savings
  checkpoint_every_n_layers: 1  # Checkpoint every layer
  use_compile: true  # torch.compile for additional optimization (PyTorch 2.0+)
  max_grad_norm: 1.0  # Gradient clipping
  output_dir: "checkpoints"
  resume: false
  wandb_project: "TeaMoE"
  wandb_entity: null
  device: null  # auto-detect
