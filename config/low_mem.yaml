# Config for low VRAM GPUs (e.g. 4-6GB: GTX 1660, RTX 3050, RTX 2060)
model:
  num_layers: 6
  moe_start_layer: 2
  moe_end_layer: 4
  model_dim: 128
  num_heads: 4
  conv_kernel_size: 15
  ff_multiplier: 2

  num_groups: 2
  experts_per_group: 2
  total_experts: 4
  top_k_groups: 1
  top_k_inference: 1

  group_configs:
    - group_id: 0
      group_name: "vowels"
      num_experts: 2
      expert_dim: 128
      ff_multiplier: 2
      dropout: 0.1
      specialization: "vowels"
    - group_id: 1
      group_name: "consonants"
      num_experts: 2
      expert_dim: 128
      ff_multiplier: 2
      dropout: 0.1
      specialization: "consonants"

  vocab_size: 5000
  decoder_hidden: 128
  decoder_layers: 1
  blank_id: 0

  competition_freq_steps: 1000
  distillation_weight: 0.1
  load_balance_weight: 0.01
  z_loss_weight: 0.001
  ctc_phone_weight: 0.0

  sample_rate: 16000
  n_mels: 80
  hop_length: 128
  win_length: 1024

  alpha: 0.5
  use_matchmaker: false

data:
  manifests_dir: "datasets/processed_data_librispeech/manifests"
  train_manifest: "train.jsonl"
  valid_manifest: "validation.jsonl"
  test_manifest: "test.jsonl"
  sample_rate: 16000
  n_mels: 80
  hop_length: 128
  win_length: 1024
  max_duration: 30.0
  num_workers: 0

training:
  num_epochs: 100
  batch_size: 1
  learning_rate: 0.001
  warmup_steps: 50000
  total_steps: 500000
  output_dir: "checkpoints"
  resume: false
  wandb_project: "TeaMoE"
  wandb_entity: null
  device: null  # auto-detect
