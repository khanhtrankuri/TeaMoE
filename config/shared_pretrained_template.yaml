# ============================================================================
# TeaMoE Shared Pretrained Experts Template
# Use this as base, then run: python generate_shared_config.py
# ============================================================================

# This file is a TEMPLATE. The actual shared config will be generated
# by generate_shared_config.py which inserts your pretrained expert paths.

model:
  # -------------------- Encoder Backbone --------------------
  num_layers: 24
  moe_start_layer: 6
  moe_end_layer: 18
  model_dim: 1024
  num_heads: 16
  conv_kernel_size: 31
  ff_multiplier: 4

  # -------------------- MoE Configuration --------------------
  num_groups: 8
  experts_per_group: 5
  total_experts: 40
  top_k_groups: 1
  top_k_inference: 2

  # -------------------- Shared Pretrained Experts --------------------
  # THIS WILL BE FILLED BY generate_shared_config.py
  # Expected format after generation:
  # group_expert_pretrained_paths:
  #   - ["checkpoints/pretrained/expert_M1.pt", "checkpoints/pretrained/expert_M2.pt", ...]  # Group 0
  #   - ["checkpoints/pretrained/expert_M1.pt", "checkpoints/pretrained/expert_M2.pt", ...]  # Group 1
  #   ... (repeat for all 8 groups, all pointing to same 5 files)
  group_expert_pretrained_paths: null  # Will be replaced

  # -------------------- Expert Pooling Strategy --------------------
  # RECOMMENDED: true for shared pretrained experts
  use_attention_pooling: true    # Token-aware expert weighting
  attn_heads: 4                  # Multi-head attention
  attn_dropout: 0.1              # Attention dropout

  # -------------------- Group Configurations --------------------
  group_configs:
    - group_id: 0
      group_name: "vowels"
      num_experts: 5
      expert_dim: 1024
      ff_multiplier: 4
      dropout: 0.1
      specialization: "vowels"
    - group_id: 1
      group_name: "plosives"
      num_experts: 5
      expert_dim: 1024
      ff_multiplier: 4
      dropout: 0.1
      specialization: "plosives"
    - group_id: 2
      group_name: "fricatives"
      num_experts: 5
      expert_dim: 1024
      ff_multiplier: 4
      dropout: 0.1
      specialization: "fricatives"
    - group_id: 3
      group_name: "nasals"
      num_experts: 5
      expert_dim: 1024
      ff_multiplier: 4
      dropout: 0.1
      specialization: "nasals"
    - group_id: 4
      group_name: "male_speakers"
      num_experts: 5
      expert_dim: 1024
      ff_multiplier: 4
      dropout: 0.1
      specialization: "male"
    - group_id: 5
      group_name: "female_speakers"
      num_experts: 5
      expert_dim: 1024
      ff_multiplier: 4
      dropout: 0.1
      specialization: "female"
    - group_id: 6
      group_name: "clean_audio"
      num_experts: 5
      expert_dim: 1024
      ff_multiplier: 4
      dropout: 0.1
      specialization: "clean"
    - group_id: 7
      group_name: "other_audio"
      num_experts: 5
      expert_dim: 1024
      ff_multiplier: 4
      dropout: 0.1
      specialization: "other"

  vocab_size: 5000
  decoder_hidden: 1024
  decoder_layers: 2
  blank_id: 0
  num_phones: 256

  # Loss weights (fine-tuning from pretrained)
  competition_freq_steps: 1000
  distillation_weight: 0.1        # Preserve pretrained knowledge
  load_balance_weight: 0.01
  z_loss_weight: 0.001
  ctc_phone_weight: 0.3

  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024

  alpha: 0.5
  use_matchmaker: true

# ============================================================================
# DATA
# ============================================================================
data:
  manifests_dir: "datasets/processed_data_librispeech/manifests"
  train_manifest: "train.jsonl"
  valid_manifest: "validation.jsonl"
  test_manifest: "test.jsonl"
  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024
  max_duration: 30.0
  num_workers: 8

# ============================================================================
# TRAINING (Fine-tuning)
# ============================================================================
training:
  num_epochs: 50
  batch_size: 16
  learning_rate: 1e-4            # Lower LR for fine-tuning pretrained experts
  warmup_steps: 10000
  total_steps: 250000
  output_dir: "checkpoints/finetuned_shared"
  resume: false

  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  weight_decay: 0.01
  use_amp: true
  use_checkpoint: true
  use_compile: false

  eval_every_n_steps: 1000
  log_every_n_steps: 10
  save_every_n_steps: 5000
  keep_last_n_checkpoints: 5

  wandb_project: "TeaMoE-shared"
  wandb_entity: null
  wandb_tags: ["shared-pretrained", "attention-pooling"]
  wandb_notes: "Shared pretrained experts M1-M5 across all 8 groups"

  device: null
  seed: 42

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
#
# 1. Train pretrained experts:
#    python train_pretrained_experts.py \
#      --epochs 10 \
#      --output-dir checkpoints/pretrained
#
#    OR distill from HuggingFace:
#    python distill_hf_to_experts.py \
#      --output-dir checkpoints/pretrained \
#      --epochs 3
#
# 2. Generate this config automatically:
#    python generate_shared_config.py \
#      --pretrained-dir checkpoints/pretrained \
#      --output config/shared_pretrained.yaml
#
# 3. Fine-tune TeaMoE:
#    python train.py \
#      --config config/shared_pretrained.yaml \
#      --output-dir checkpoints/finetuned_shared
#
# 4. Monitor specialization:
#    - Check wandb for "specialization_index" metric
#    - Specialization Index should increase from 0.0 → 0.4+
#
# ============================================================================
