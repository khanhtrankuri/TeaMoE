# Ultra memory-optimized config for very limited GPU memory (e.g., 16GB)
# Use this if default_optimized.yaml still causes OOM
model:
  num_layers: 12  # Minimal layers
  moe_start_layer: 2
  moe_end_layer: 8
  model_dim: 512  # Small dimension
  num_heads: 8  # 512/8 = 64 per head
  conv_kernel_size: 31
  ff_multiplier: 2  # Minimal FFN expansion

  num_groups: 4  # Fewer expert groups
  experts_per_group: 3  # Fewer experts per group
  total_experts: 12  # Much fewer total experts
  top_k_groups: 1
  top_k_inference: 2

  group_configs:
    - group_id: 0
      group_name: "speech_sounds"
      num_experts: 3
      expert_dim: 512
      ff_multiplier: 2
      dropout: 0.1
    - group_id: 1
      group_name: "phonemes"
      num_experts: 3
      expert_dim: 512
      ff_multiplier: 2
      dropout: 0.1
    - group_id: 2
      group_name: "prosody"
      num_experts: 3
      expert_dim: 512
      ff_multiplier: 2
      dropout: 0.1
    - group_id: 3
      group_name: "general"
      num_experts: 3
      expert_dim: 512
      ff_multiplier: 2
      dropout: 0.1

  vocab_size: 5000
  decoder_hidden: 512
  decoder_layers: 2
  blank_id: 0

  competition_freq_steps: 1000
  distillation_weight: 0.1
  load_balance_weight: 0.01
  z_loss_weight: 0.001
  ctc_phone_weight: 0.3

  sample_rate: 16000
  n_mels: 80
  hop_length: 320  # Slightly larger hop for fewer time steps
  win_length: 1024

  alpha: 0.5
  use_matchmaker: true

data:
  manifests_dir: "datasets/processed_data_librispeech/manifests"
  train_manifest: "train.jsonl"
  valid_manifest: "validation.jsonl"
  test_manifest: "test.jsonl"
  sample_rate: 16000
  n_mels: 80
  hop_length: 320
  win_length: 1024
  max_duration: 15.0  # Reduced from 30.0 for shorter sequences
  num_workers: 4

training:
  num_epochs: 50
  batch_size: 2  # Very small batch size
  learning_rate: 0.001
  warmup_steps: 50000
  total_steps: 500000
  gradient_accumulation_steps: 8  # Effective batch = 2 * 8 = 16
  use_amp: true
  use_checkpoint: true
  checkpoint_every_n_layers: 1
  use_compile: false  # Disable if memory still tight (compile adds overhead)
  max_grad_norm: 1.0
  output_dir: "checkpoints"
  resume: false
  wandb_project: "TeaMoE"
  wandb_entity: null
  device: null
