# Config for 8GB VRAM GPUs (e.g. RTX 3070, RTX 4060 Ti)
model:
  num_layers: 12
  moe_start_layer: 4
  moe_end_layer: 8
  model_dim: 512
  num_heads: 8
  conv_kernel_size: 31
  ff_multiplier: 4

  num_groups: 4
  experts_per_group: 4
  total_experts: 16
  top_k_groups: 1
  top_k_inference: 2

  group_configs:
    - group_id: 0
      group_name: "vowels"
      num_experts: 4
      expert_dim: 512
      ff_multiplier: 4
      dropout: 0.1
      specialization: "vowels"
    - group_id: 1
      group_name: "consonants"
      num_experts: 4
      expert_dim: 512
      ff_multiplier: 4
      dropout: 0.1
      specialization: "consonants"
    - group_id: 2
      group_name: "male_speakers"
      num_experts: 4
      expert_dim: 512
      ff_multiplier: 4
      dropout: 0.1
      specialization: "male"
    - group_id: 3
      group_name: "female_speakers"
      num_experts: 4
      expert_dim: 512
      ff_multiplier: 4
      dropout: 0.1
      specialization: "female"

  vocab_size: 5000
  decoder_hidden: 512
  decoder_layers: 1
  blank_id: 0

  competition_freq_steps: 1000
  distillation_weight: 0.1
  load_balance_weight: 0.01
  z_loss_weight: 0.001
  ctc_phone_weight: 0.0

  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024

  alpha: 0.5
  use_matchmaker: true

data:
  manifests_dir: "datasets/processed_data_librispeech/manifests"
  train_manifest: "train.jsonl"
  valid_manifest: "validation.jsonl"
  test_manifest: "test.jsonl"
  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024
  max_duration: 30.0
  num_workers: 2

training:
  num_epochs: 100
  batch_size: 4
  learning_rate: 0.001
  warmup_steps: 50000
  total_steps: 500000
  output_dir: "checkpoints"
  resume: false
  wandb_project: "TeaMoE"
  wandb_entity: null
  device: null  # auto-detect
