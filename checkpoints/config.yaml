checkpoint:
  best_metric: wer
  load_optimizer_state: true
  load_scheduler_state: true
  mode: min
  resume_from_checkpoint: null
  save_best_only: false
  save_dir: checkpoints/minimal
  save_optimizer: true
  save_rng_state: true
  save_scheduler: true
  strict: true
competition:
  alpha: 0.5
  elite_count: 1
  enabled: false
  frequency_steps: 1000
  mutation_rate: 0.01
  num_batches: 1
  use_matchmaker: false
data:
  augmentation:
    enabled: true
    spec_augment:
      enabled: true
      freq_mask_param: 15
      num_masks: 2
      time_mask_param: 30
    speed_perturbation:
    - 0.9
    - 1.0
    - 1.1
  hop_length: 256
  manifests_dir: datasets/processed_data_librispeech/manifests
  max_duration: 10.0
  min_duration: 0.1
  n_mels: 80
  num_workers: 2
  persistent_workers: false
  pin_memory: true
  prefetch_factor: 2
  sample_rate: 16000
  test_manifest: test.jsonl
  train_manifest: train.jsonl
  valid_manifest: validation.jsonl
  win_length: 1024
distillation:
  batch_size: 8
  epochs: 3
  expert_dim: 256
  hf_models:
  - facebook/mms-300m
  - speechbrain/asr-conformersmall-transformerlm-librispeech
  learning_rate: 5e-4
  loss: mse
  n_mels: 80
  num_workers: 2
distributed:
  backend: nccl
  enabled: false
  init_method: env://
  rank: 0
  world_size: 1
inference:
  am_weight: 0.5
  apply_lm: false
  beam_alpha: 0.6
  beam_beta: 0.0
  beam_size: 4
  decoder_type: greedy
  lm_weight: 0.5
  return_timestamps: false
  return_token_timestamps: false
  rnnt_blank_id: 0
  rnnt_max_symbols_per_step: 5
logging:
  compute_expert_diversity: false
  compute_gini: true
  compute_per: true
  compute_specialization: false
  compute_wer: true
  log_expert_usage: true
  log_gradient_norm: true
  log_learning_rate: true
  log_specialization: false
  log_train_loss: true
  log_val_metrics: true
  plot_expert_usage: true
  plot_group_distribution: true
  plot_specialization_trend: false
model:
  alpha: 0.5
  attention_dropout: 0.1
  attn_dropout: 0.1
  attn_heads: 4
  blank_id: 0
  competition_freq_steps: 0
  conv_dropout: 0.1
  conv_kernel_size: 31
  ctc_phone_weight: 0.0
  decoder_hidden: 256
  decoder_layers: 1
  distillation_weight: 0.0
  dropout: 0.1
  experts_per_group: 4
  ff_multiplier: 4
  group_configs:
  - dropout: 0.1
    expert_dim: 256
    ff_multiplier: 4
    group_id: 0
    group_name: vowels
    num_experts: 4
    specialization: vowels
  - dropout: 0.1
    expert_dim: 256
    ff_multiplier: 4
    group_id: 1
    group_name: plosives
    num_experts: 4
    specialization: plosives
  - dropout: 0.1
    expert_dim: 256
    ff_multiplier: 4
    group_id: 2
    group_name: fricatives
    num_experts: 4
    specialization: fricatives
  - dropout: 0.1
    expert_dim: 256
    ff_multiplier: 4
    group_id: 3
    group_name: nasals
    num_experts: 4
    specialization: nasals
  group_expert_pretrained_paths: null
  hop_length: 256
  load_balance_weight: 0.01
  model_dim: 256
  moe_end_layer: 9
  moe_start_layer: 3
  n_mels: 80
  norm_after_moe: true
  num_groups: 4
  num_heads: 8
  num_layers: 8
  num_phones: 128
  phone_blank_id: 0
  sample_rate: 16000
  top_k_groups: 1
  top_k_inference: 2
  total_experts: 16
  use_attention_pooling: false
  use_matchmaker: false
  use_whisper_features: false
  vocab_size: 1000
  whisper_freeze: true
  whisper_model_name: openai/whisper-base
  whisper_proj_dropout: 0.1
  win_length: 1024
  z_loss_weight: 0.001
profiling:
  check_inf: true
  check_nan: true
  enabled: false
  log_expert_weights: false
  log_grad_norm: false
  profile_backward: false
  profile_forward: false
  profile_memory: false
training:
  batch_size: 2
  beta1: 0.9
  beta2: 0.999
  deterministic: false
  device: null
  early_stopping_metric: wer
  early_stopping_patience: 5
  eps: 1e-8
  eval_every_n_steps: 200
  gradient_accumulation_steps: 4
  keep_best_checkpoints: 1
  keep_last_n_checkpoints: 2
  learning_rate: 0.0005
  log_every_n_steps: 10
  log_to_console: true
  max_grad_norm: 1.0
  num_epochs: 50
  optimizer: adamw
  save_every_n_steps: 1000
  seed: 42
  total_steps: 50000
  use_amp: true
  use_checkpoint: true
  use_compile: false
  wandb_entity: null
  wandb_mode: online
  wandb_notes: RTX 4070 8GB minimal config - testing pipeline
  wandb_project: TeaMoE-minimal
  wandb_tags:
  - minimal
  - rtx4070
  - debug
  warmup_steps: 1000
  weight_decay: 0.01
