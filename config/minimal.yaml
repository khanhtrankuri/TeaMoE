# ============================================================================
# TeaMoE Minimal Configuration
# Using Shared Pretrained Experts (HuBERT & wav2vec2)
# ============================================================================

# ----------------------------------------------------------------------------
# MODEL ARCHITECTURE
# ----------------------------------------------------------------------------
model:
  # -------------------- Encoder Backbone --------------------
  num_layers: 12
  moe_start_layer: 3
  moe_end_layer: 10
  model_dim: 1024              # Match pretrained expert input dim
  num_heads: 16
  conv_kernel_size: 31
  ff_multiplier: 4

  # -------------------- MoE Configuration --------------------
  num_groups: 4
  experts_per_group: 4
  total_experts: 16
  top_k_groups: 1
  top_k_inference: 2

  # -------------------- Shared Pretrained Experts --------------------
  # expert_1.pt: facebook/hubert-large-ls960-ft
  # expert_2.pt: facebook/wav2vec2-large-xlsr-53
  # Using 2 groups with pretrained experts, 2 groups random init
  group_expert_pretrained_paths:
    - ["./checkpoints/pretrained/expert_1.pt",
       "./checkpoints/pretrained/expert_1.pt",
       "./checkpoints/pretrained/expert_1.pt",
       "./checkpoints/pretrained/expert_1.pt"]
    - ["./checkpoints/pretrained/expert_2.pt",
       "./checkpoints/pretrained/expert_2.pt",
       "./checkpoints/pretrained/expert_2.pt",
       "./checkpoints/pretrained/expert_2.pt"]
    - [null, null, null, null]
    - [null, null, null, null]

  # -------------------- Expert Pooling Strategy --------------------
  use_attention_pooling: false
  attn_heads: 4
  attn_dropout: 0.1

  # -------------------- Group Configurations --------------------
  # expert_dim=1024 matches pretrained checkpoint (input dim), ff_multiplier=4 -> hidden=4096
  group_configs:
    - group_id: 0
      group_name: "hubert_experts"
      num_experts: 4
      expert_dim: 1024         # Match pretrained checkpoint input dim
      ff_multiplier: 4
      dropout: 0.1
      specialization: "hubert"
    - group_id: 1
      group_name: "wav2vec2_experts"
      num_experts: 4
      expert_dim: 1024         # Match pretrained checkpoint input dim
      ff_multiplier: 4
      dropout: 0.1
      specialization: "wav2vec2"
    - group_id: 2
      group_name: "vowels"
      num_experts: 4
      expert_dim: 1024
      ff_multiplier: 4
      dropout: 0.1
      specialization: "vowels"
    - group_id: 3
      group_name: "plosives"
      num_experts: 4
      expert_dim: 1024
      ff_multiplier: 4
      dropout: 0.1
      specialization: "plosives"

  # -------------------- Decoder (RNN-T) --------------------
  vocab_size: 5000
  decoder_hidden: 1024
  decoder_layers: 2
  blank_id: 0

  # -------------------- Auxiliary Phone Head --------------------
  num_phones: 256
  phone_blank_id: 0

  # -------------------- Loss Weights --------------------
  competition_freq_steps: 1000
  distillation_weight: 0.1
  load_balance_weight: 0.01
  z_loss_weight: 0.001
  ctc_phone_weight: 0.3

  # -------------------- Audio Preprocessing --------------------
  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024

  # -------------------- Regularization --------------------
  dropout: 0.1
  attention_dropout: 0.1
  conv_dropout: 0.1

  # -------------------- Other Options --------------------
  alpha: 0.5
  use_matchmaker: false
  norm_after_moe: true

  # -------------------- Whisper Feature Integration --------------------
  use_whisper_features: false
  whisper_model_name: "openai/whisper-base"
  whisper_freeze: true
  whisper_proj_dropout: 0.1

# ----------------------------------------------------------------------------
# DATA CONFIGURATION
# ----------------------------------------------------------------------------
data:
  manifests_dir: "./datasets/processed_data_librispeech/manifests"
  train_manifest: "train.jsonl"
  valid_manifest: "validation.jsonl"
  test_manifest: "test.jsonl"

  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024
  max_duration: 15.0
  min_duration: 0.1
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: true

  # Data augmentation
  augmentation:
    enabled: true
    speed_perturbation: [0.9, 1.0, 1.1]
    spec_augment:
      enabled: true
      freq_mask_param: 20
      time_mask_param: 50
      num_masks: 2

# ----------------------------------------------------------------------------
# TRAINING CONFIGURATION
# ----------------------------------------------------------------------------
training:
  num_epochs: 50
  batch_size: 8
  learning_rate: 0.0005
  warmup_steps: 2000
  total_steps: 50000

  # Optimization
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  weight_decay: 0.01
  optimizer: "adamw"
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8

  # Mixed precision & efficiency
  use_amp: true
  use_checkpoint: true
  use_compile: false

  # Evaluation & Logging
  eval_every_n_steps: 500
  log_every_n_steps: 10
  save_every_n_steps: 2000
  keep_last_n_checkpoints: 3
  keep_best_checkpoints: 2

  # Early stopping
  early_stopping_patience: 10
  early_stopping_metric: "wer"

  # Experiment tracking
  wandb_project: "TeaMoE-pretrained"
  wandb_entity: null
  wandb_tags: ["pretrained", "hubert", "wav2vec2"]
  wandb_notes: "Training with HuBERT + wav2vec2 pretrained experts"
  wandb_mode: "online"
  log_to_console: true

  # Hardware
  device: null
  seed: 42
  deterministic: false

# ----------------------------------------------------------------------------
# DISTILLATION CONFIGURATION
# ----------------------------------------------------------------------------
distillation:
  hf_models:
    - "facebook/mms-300m"
    - "facebook/hubert-large-ls960-ft"
    - "facebook/wav2vec2-large-xlsr-53"
    - "openai/whisper-large-v3"

  epochs: 5
  batch_size: 16
  learning_rate: 1e-3
  num_workers: 4
  expert_dim: 1024
  n_mels: 80
  loss: "mse"

# ----------------------------------------------------------------------------
# INFERENCE CONFIGURATION
# ----------------------------------------------------------------------------
inference:
  decoder_type: "greedy"
  beam_size: 5
  beam_alpha: 0.6
  beam_beta: 0.0
  rnnt_blank_id: 0
  rnnt_max_symbols_per_step: 10
  apply_lm: false
  lm_weight: 0.5
  am_weight: 0.5
  return_timestamps: false
  return_token_timestamps: false

# ----------------------------------------------------------------------------
# COMPETITION CONFIGURATION
# ----------------------------------------------------------------------------
competition:
  enabled: false
  frequency_steps: 1000
  num_batches: 2
  alpha: 0.5
  use_matchmaker: false
  mutation_rate: 0.01
  elite_count: 1

# ----------------------------------------------------------------------------
# LOGGING & METRICS
# ----------------------------------------------------------------------------
logging:
  log_train_loss: true
  log_val_metrics: true
  log_gradient_norm: true
  log_expert_usage: true
  log_specialization: false
  log_learning_rate: true

  compute_wer: true
  compute_per: true
  compute_gini: true
  compute_expert_diversity: true
  compute_specialization: false

  plot_expert_usage: true
  plot_group_distribution: true
  plot_specialization_trend: false

# ----------------------------------------------------------------------------
# MULTI-GPU CONFIGURATION (Single GPU Mode)
# ----------------------------------------------------------------------------
distributed:
  enabled: false
  backend: "nccl"
  init_method: "env://"
  world_size: 1
  rank: 0

# ----------------------------------------------------------------------------
# CHECKPOINTING
# ----------------------------------------------------------------------------
checkpoint:
  save_dir: "checkpoints/minimal"
  save_optimizer: true
  save_scheduler: true
  save_rng_state: true
  save_best_only: false
  best_metric: "wer"
  mode: "min"
  resume_from_checkpoint: null
  load_optimizer_state: true
  load_scheduler_state: true
  strict: true

# ----------------------------------------------------------------------------
# PROFILING & DEBUGGING
# ----------------------------------------------------------------------------
profiling:
  enabled: false
  profile_memory: false
  profile_forward: false
  profile_backward: false
  check_nan: true
  check_inf: true
  log_grad_norm: false
  log_expert_weights: false

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
#
# 1. Train with pretrained experts:
#    python train.py --config config/minimal.yaml
#
# 2. Pretrained experts used:
#    - Group 0 (hubert_experts): expert_1.pt (HuBERT Large)
#    - Group 1 (wav2vec2_experts): expert_2.pt (wav2vec2 XLSR)
#    - Group 2-3: Random initialization
#
# 3. Estimated VRAM usage:
#    - Model (FP16): ~2 GB
#    - Gradients: ~2 GB
#    - Optimizer: ~4 GB
#    - Activations: ~6-8 GB
#    - Total: ~14-18 GB / 24 GB
#
# ============================================================================