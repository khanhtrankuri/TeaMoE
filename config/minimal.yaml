# ============================================================================
# TeaMoE Minimal Configuration
# Optimized for NVIDIA RTX 4070 8GB VRAM (Single GPU Training)
# ============================================================================

# ----------------------------------------------------------------------------
# MODEL ARCHITECTURE
# ----------------------------------------------------------------------------
model:
  # -------------------- Encoder Backbone --------------------
  # Heavily reduced for 8GB VRAM
  num_layers: 8                 # Total transformer layers (minimal)
  moe_start_layer: 3            # First layer with MoE (0-indexed)
  moe_end_layer: 9              # Last layer with MoE (exclusive)
  model_dim: 256                # Hidden dimension (minimal for 8GB)
  num_heads: 8                  # Multi-head attention heads
  conv_kernel_size: 31          # Depthwise conv kernel
  ff_multiplier: 4              # FFN expansion factor

  # -------------------- MoE Configuration --------------------
  num_groups: 4                 # Reduced groups (4 instead of 8)
  experts_per_group: 4          # Experts per group
  total_experts: 16             # num_groups × experts_per_group (4 × 4 = 16)
  top_k_groups: 1               # Route to top-k groups during training
  top_k_inference: 2            # Route to top-k groups during inference

  # -------------------- Shared Pretrained Experts --------------------
  # Set to null to train from scratch
  group_expert_pretrained_paths: null

  # -------------------- Expert Pooling Strategy --------------------
  use_attention_pooling: false  # Mean pooling (simpler, less VRAM)
  attn_heads: 4
  attn_dropout: 0.1

  # -------------------- Group Configurations --------------------
  # Only 4 groups for minimal config
  group_configs:
    - group_id: 0
      group_name: "vowels"
      num_experts: 4
      expert_dim: 256
      ff_multiplier: 4
      dropout: 0.1
      specialization: "vowels"
    - group_id: 1
      group_name: "plosives"
      num_experts: 4
      expert_dim: 256
      ff_multiplier: 4
      dropout: 0.1
      specialization: "plosives"
    - group_id: 2
      group_name: "fricatives"
      num_experts: 4
      expert_dim: 256
      ff_multiplier: 4
      dropout: 0.1
      specialization: "fricatives"
    - group_id: 3
      group_name: "nasals"
      num_experts: 4
      expert_dim: 256
      ff_multiplier: 4
      dropout: 0.1
      specialization: "nasals"

  # -------------------- Decoder (RNN-T) --------------------
  vocab_size: 1000              # Reduced vocabulary for speed
  decoder_hidden: 256           # Match model_dim
  decoder_layers: 1             # Reduced layers
  blank_id: 0

  # -------------------- Auxiliary Phone Head --------------------
  num_phones: 128               # Reduced phone set
  phone_blank_id: 0

  # -------------------- Loss Weights --------------------
  competition_freq_steps: 0     # Disabled
  distillation_weight: 0.0      # Disabled for minimal config
  load_balance_weight: 0.01
  z_loss_weight: 0.001
  ctc_phone_weight: 0.0         # Disabled to simplify

  # -------------------- Audio Preprocessing --------------------
  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024

  # -------------------- Regularization --------------------
  dropout: 0.1
  attention_dropout: 0.1
  conv_dropout: 0.1

  # -------------------- Other Options --------------------
  alpha: 0.5
  use_matchmaker: false
  norm_after_moe: true

  # -------------------- Whisper Feature Integration --------------------
  use_whisper_features: false
  whisper_model_name: "openai/whisper-base"
  whisper_freeze: true
  whisper_proj_dropout: 0.1

# ----------------------------------------------------------------------------
# DATA CONFIGURATION
# ----------------------------------------------------------------------------
data:
  manifests_dir: "datasets/processed_data_librispeech/manifests"
  train_manifest: "train.jsonl"
  valid_manifest: "validation.jsonl"
  test_manifest: "test.jsonl"

  sample_rate: 16000
  n_mels: 80
  hop_length: 256
  win_length: 1024
  max_duration: 10.0            # Short duration for 8GB VRAM
  min_duration: 0.1
  num_workers: 2                # Minimal workers
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: false

  # Data augmentation (CRITICAL for small model)
  augmentation:
    enabled: true
    speed_perturbation: [0.9, 1.0, 1.1]
    spec_augment:
      enabled: true
      freq_mask_param: 15
      time_mask_param: 30
      num_masks: 2

# ----------------------------------------------------------------------------
# TRAINING CONFIGURATION
# ----------------------------------------------------------------------------
training:
  num_epochs: 50                # Fewer epochs for testing
  batch_size: 2                 # Very small batch for 8GB
  learning_rate: 0.0005         # Conservative LR
  warmup_steps: 1000            # Short warmup
  total_steps: 50000            # Total training steps

  # Optimization
  gradient_accumulation_steps: 4  # Effective batch = 4 × 4 = 16
  max_grad_norm: 1.0
  weight_decay: 0.01
  optimizer: "adamw"
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8

  # Mixed precision & efficiency (MANDATORY for 8GB)
  use_amp: true                 # FP16 mixed precision (required)
  use_checkpoint: true          # Gradient checkpointing (required)
  use_compile: false            # Disabled for compatibility

  # Evaluation & Logging
  eval_every_n_steps: 200       # Frequent validation
  log_every_n_steps: 10         # Log every 10 steps
  save_every_n_steps: 1000      # Save checkpoints
  keep_last_n_checkpoints: 2    # Minimal checkpoint storage
  keep_best_checkpoints: 1      # Keep only best

  # Early stopping
  early_stopping_patience: 5
  early_stopping_metric: "wer"

  # Experiment tracking
  wandb_project: "TeaMoE-minimal"
  wandb_entity: null
  wandb_tags: ["minimal", "rtx4070", "debug"]
  wandb_notes: "RTX 4070 8GB minimal config - testing pipeline"
  wandb_mode: "online"
  log_to_console: true

  # Hardware
  device: null
  seed: 42
  deterministic: false

# ----------------------------------------------------------------------------
# DISTILLATION CONFIGURATION
# ----------------------------------------------------------------------------
distillation:
  hf_models:
    - "facebook/mms-300m"
    - "speechbrain/asr-conformersmall-transformerlm-librispeech"

  epochs: 3
  batch_size: 8
  learning_rate: 5e-4
  num_workers: 2
  expert_dim: 256
  n_mels: 80
  loss: "mse"

# ----------------------------------------------------------------------------
# INFERENCE CONFIGURATION
# ----------------------------------------------------------------------------
inference:
  decoder_type: "greedy"
  beam_size: 4
  beam_alpha: 0.6
  beam_beta: 0.0
  rnnt_blank_id: 0
  rnnt_max_symbols_per_step: 5
  apply_lm: false
  lm_weight: 0.5
  am_weight: 0.5
  return_timestamps: false
  return_token_timestamps: false

# ----------------------------------------------------------------------------
# COMPETITION CONFIGURATION
# ----------------------------------------------------------------------------
competition:
  enabled: false
  frequency_steps: 1000
  num_batches: 1
  alpha: 0.5
  use_matchmaker: false
  mutation_rate: 0.01
  elite_count: 1

# ----------------------------------------------------------------------------
# LOGGING & METRICS
# ----------------------------------------------------------------------------
logging:
  log_train_loss: true
  log_val_metrics: true
  log_gradient_norm: true
  log_expert_usage: true
  log_specialization: false
  log_learning_rate: true

  compute_wer: true
  compute_per: true
  compute_gini: true
  compute_expert_diversity: false
  compute_specialization: false

  plot_expert_usage: true
  plot_group_distribution: true
  plot_specialization_trend: false

# ----------------------------------------------------------------------------
# MULTI-GPU CONFIGURATION (Single GPU Mode)
# ----------------------------------------------------------------------------
distributed:
  enabled: false
  backend: "nccl"
  init_method: "env://"
  world_size: 1
  rank: 0

# ----------------------------------------------------------------------------
# CHECKPOINTING
# ----------------------------------------------------------------------------
checkpoint:
  save_dir: "checkpoints/minimal"
  save_optimizer: true
  save_scheduler: true
  save_rng_state: true
  save_best_only: false
  best_metric: "wer"
  mode: "min"
  resume_from_checkpoint: null
  load_optimizer_state: true
  load_scheduler_state: true
  strict: true

# ----------------------------------------------------------------------------
# PROFILING & DEBUGGING
# ----------------------------------------------------------------------------
profiling:
  enabled: false
  profile_memory: false
  profile_forward: false
  profile_backward: false
  check_nan: true
  check_inf: true
  log_grad_norm: false
  log_expert_weights: false

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
#
# 1. Train on RTX 4070 8GB:
#    python train.py --config config/minimal.yaml
#
# 2. If OOM errors occur, reduce further:
#    - batch_size: 4 → 2
#    - max_duration: 15 → 10
#    - num_layers: 12 → 8
#    - model_dim: 512 → 256
#
# 3. This is a DEBUG/TEST config - not for production
#    Goal: Verify pipeline works before scaling up
#
# 4. Estimated VRAM usage:
#    - Model (FP16): ~100 MB
#    - Gradients: ~100 MB
#    - Optimizer: ~800 MB
#    - Activations: ~4-5 GB (with checkpointing)
#    - Data buffers: ~1 GB
#    - Total: ~6-7 GB / 8 GB
#
# 5. Estimated training time (subset of LibriSpeech):
#    - 1 epoch: ~4-6 hours
#    - 50 epochs: ~10-15 days
#
# 6. Next steps after successful test:
#    - Scale to config/single_gpu.yaml (A5000 24GB settings)
#    - Then scale to config/complete.yaml (4x A100 settings)
#
# ============================================================================